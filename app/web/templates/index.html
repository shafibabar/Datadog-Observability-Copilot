<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability Copilot</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- Left: conversations -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="dot"></span>
          <strong>Observability&nbsp;Copilot</strong>
        </div>
        <button id="new-chat" class="btn-new" type="button">＋ New investigation</button>
      </div>
      <nav id="convo-list" class="convo-list" aria-label="Conversations"></nav>
      <div class="sidebar-foot">
        <span id="status-banner" class="status">checking…</span>
      </div>
    </aside>

    <!-- Center: chat -->
    <main class="main">
      <header class="main-head">
        <div id="convo-title" class="convo-title">Investigation</div>
        <div class="head-actions">
          <label for="persona" class="head-label">Explain as</label>
          <select id="persona" aria-label="Persona">
            <option value="support">Support Engineer</option>
            <option value="sre" selected>Site Reliability Engineer</option>
            <option value="swe">Software Engineer</option>
            <option value="pm">Product Manager</option>
            <option value="leadership">Engineering Leadership</option>
          </select>
          <button id="gen-summary" class="ghost" type="button">Incident Summary</button>
          <button id="toggle-workspace" class="ghost icon" type="button" title="Toggle Workspace panel">⧉</button>
        </div>
      </header>

      <div id="chat" class="chat"></div>

      <form id="composer" class="composer">
        <textarea id="input" rows="1"
          placeholder="Ask about system health, recent changes, or an incident… e.g. “Is the system healthy right now?”"></textarea>
        <button type="submit" id="send">Send</button>
      </form>
    </main>

    <!-- Right: the living Investigation Workspace -->
    <aside id="workspace" class="workspace">
      <div class="workspace-head">
        <div>
          <strong>Investigation Workspace</strong>
          <div class="ws-sub">the living document · updates as you investigate</div>
        </div>
        <span id="ws-snapshot" class="ws-snapshot"></span>
      </div>
      <div id="ws-body" class="ws-body">
        <div class="ws-empty">Ask a question to start building the investigation.</div>
      </div>
    </aside>

  </div>
  <script src="/static/app.js"></script>
</body>
</html>
