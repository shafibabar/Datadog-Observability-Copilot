<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability Copilot</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- Left: conversations -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand"><span class="dot"></span><span>Observability&nbsp;Copilot</span></div>
        <button id="new-chat" class="btn-new" type="button">
          <span class="plus">＋</span> New investigation
        </button>
      </div>
      <nav id="convo-list" class="convo-list" aria-label="Conversations"></nav>
      <div class="sidebar-foot"><span id="status-banner" class="status">checking…</span></div>
    </aside>

    <div class="resizer" id="resize-left" title="Drag to resize · click chevron to collapse">
      <button class="collapse" id="collapse-left" type="button" title="Collapse">‹</button>
    </div>

    <!-- Center: chat -->
    <main class="main">
      <header class="topbar">
        <div id="convo-title" class="convo-title">Investigation</div>
        <button id="gen-summary" class="btn-ghost" type="button">Incident Summary</button>
      </header>

      <div id="chat" class="chat"></div>

      <div class="composer-wrap">
        <div class="composer-shell">
          <form id="composer" class="composer">
            <textarea id="input" rows="1"
              placeholder="Ask about system health, recent changes, or an incident…"></textarea>
            <button type="submit" id="send" class="send" title="Send" aria-label="Send">↑</button>
          </form>
          <div class="controls" id="controls">
            <div class="scope-menu" id="scope-menu">
              <button type="button" id="scope-trigger" class="scope-trigger" aria-haspopup="true">
                <span id="scope-summary">Set scope</span><span class="ms-caret">⌄</span>
              </button>
              <div class="scope-panel" id="scope-panel" hidden></div>
            </div>
            <!-- hidden state holders the scope menu reads/writes -->
            <select id="duration-select" class="sr-only" tabindex="-1" aria-hidden="true">
              <option value="1h" selected>Last 1 hour</option>
              <option value="2h">Last 2 hours</option>
              <option value="4h">Last 4 hours</option>
              <option value="8h">Last 8 hours</option>
              <option value="1d">Last 1 day</option>
              <option value="2d">Last 2 days</option>
              <option value="1w">Last 1 week</option>
              <option value="custom">Custom range…</option>
            </select>
            <select id="persona" class="sr-only" tabindex="-1" aria-hidden="true">
              <option value="support">Support Engineer</option>
              <option value="sre" selected>Site Reliability Engineer</option>
              <option value="swe">Software Engineer</option>
              <option value="pm">Product Manager</option>
              <option value="leadership">Engineering Leadership</option>
            </select>
          </div>
        </div>
        <div id="scope-hint" class="scope-hint"></div>
      </div>
    </main>

    <div class="resizer" id="resize-right" title="Drag to resize · click chevron to collapse">
      <button class="collapse" id="collapse-right" type="button" title="Collapse">›</button>
    </div>

    <!-- Right: living Investigation Workspace -->
    <aside id="workspace" class="workspace">
      <div class="ws-head">
        <div>
          <div class="ws-title">Investigation Workspace</div>
          <div class="ws-sub">the living document · updates as you investigate</div>
        </div>
        <span id="ws-snapshot" class="ws-snapshot"></span>
      </div>
      <div id="ws-body" class="ws-body">
        <div class="ws-empty">Ask a question to start building the investigation.</div>
      </div>
    </aside>

    <!-- Custom time range (opened from the Duration dropdown) -->
    <div id="range-modal" class="modal" hidden>
      <div class="modal-card" role="dialog" aria-label="Custom time range">
        <div class="modal-title">Custom time range</div>
        <label class="modal-field">From<input type="datetime-local" id="range-start" /></label>
        <label class="modal-field">To<input type="datetime-local" id="range-end" /></label>
        <div class="modal-note">Up to 7 days · within the last 2 years · not in the future.</div>
        <div id="range-error" class="modal-error"></div>
        <div class="modal-actions">
          <button type="button" id="range-cancel" class="btn-ghost">Cancel</button>
          <button type="button" id="range-apply" class="btn-primary">Apply</button>
        </div>
      </div>
    </div>

  </div>
  <script src="/static/app.js"></script>
</body>
</html>
